kind = "web"
previewPath = "/"
title = "eQSO Linux Client"
version = "1.0.0"
id = "artifacts/eqso-client"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20982

[services.development]
run = "pnpm --filter @workspace/eqso-client run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eqso-client", "run", "build" ]
publicDir = "artifacts/eqso-client/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20982"
BASE_PATH = "/"
